<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulter les événements - E-TICKET</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin: 0;
            padding: 40px 20px;
        }

        h1 {
            color: #007bff;
            margin-bottom: 10px;
        }
        span{
            color: black;
        }               

        h3 {
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin: 10px 5px 30px 5px;
        }

        .top-buttons{
            position: absolute;
            top: 20px;
            right: 20px;     
        }
        #listeEvenements {
            max-width: 900px;
            margin: 30px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .carte-evenement {
            background: white;
            border-radius: 10px;
            padding: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .carte-evenement h3 {
            margin-top: 0;
            color: #007bff;
        }

        .carte-evenement p {
            margin: 8px 0;
        }

        .message {
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Event<span>MASTER</span></h1>
    <h3>Consulter les événements</h3>
    <div class="top-buttons">
        <a href="creerevenement.html" class="btn">Créer un événement</a>
        <a href="pageconnexion.html" class="btn">Deconnexion</a>
    </div>    

    <input 
        type="text" 
        id="searchInput" 
        placeholder="Rechercher un événement..." 
        onkeyup="searchEvent()"
        style="padding:10px; width:60%; margin-bottom:20px;"
    >
    <div id="message" class="message"></div>
    <div id="listeEvenements"></div>    

    <script>
        
        function searchEvent() {
            let input = document.getElementById("searchInput").value.toLowerCase();
            let events = document.getElementsByClassName("carte-evenement");

            for (let i = 0; i < events.length; i++) {
                let title = events[i].getElementsByTagName("h3")[0].textContent.toLowerCase();

                if (title.includes(input)) {
                    events[i].style.display = "block";
                } else {
                    events[i].style.display = "none";
                }
            }
        }
        
        function chargerEvenements() {
            const listeEvenements = document.getElementById("listeEvenements");
            const message = document.getElementById("message");

            fetch("http://localhost/EventMASTER/eventMaster/api/event")
                .then(async (response) => {
                    const text = await response.text();

                    if (!response.ok) {
                        throw new Error("Erreur HTTP " + response.status + " : " + text);
                    }

                    return JSON.parse(text);
                })
                .then((evenements) => {
                    listeEvenements.innerHTML = "";
                    message.textContent = "";

                    if (!evenements || evenements.length === 0) {
                        message.textContent = "Aucun événement disponible.";
                        return;
                    }

                    evenements.forEach((event) => {
                        const carte = document.createElement("div");
                        carte.className = "carte-evenement";

                        carte.innerHTML = `
                            <h3>${event.eventName}</h3>
                            <p><strong>Description :</strong> ${event.eventDescription}</p>
                            <p><strong>Date :</strong> ${event.eventDateTime}</p>
                            <p><strong>Adresse :</strong> ${event.eventAdress}</p>
                            <p><strong>Prix :</strong> ${event.eventTicketPrice} $</p>
                            <p><strong>Tickets :</strong> ${event.eventNumberOfTicket}</p>
                        `;

                        listeEvenements.appendChild(carte);
                    });
                })
                .catch((error) => {
                    console.error(error);
                    message.textContent = "Impossible de charger les événements.";
                });
        }
        

        chargerEvenements();
               
    </script>
</body>
</html>
